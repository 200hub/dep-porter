name: Build Release Binaries

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      needs_release: ${{ steps.version.outputs.needs_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if release exists for current version
        id: version
        run: |
          # Extract version from Cargo.toml
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"
          
          # Check if tag v{version} exists
          TAG_NAME="v${VERSION}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists, release not needed"
            echo "needs_release=false" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG_NAME does not exist, release needed"
            echo "needs_release=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.needs_release == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-amd64
            ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-amd64
            ext: ".exe"
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-amd64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
            ext: ""

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare release directory
        shell: bash
        run: |
          # Create directory with platform name
          mkdir -p "dep-porter-${{ matrix.platform }}"
          # Copy binary with standard name
          cp "target/${{ matrix.target }}/release/dep-porter${{ matrix.ext }}" "dep-porter-${{ matrix.platform }}/dep-porter${{ matrix.ext }}"
          # Create tar.gz (Unix) or zip (Windows)
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "dep-porter-${{ matrix.platform }}.zip" "dep-porter-${{ matrix.platform }}"
          else
            tar -czf "dep-porter-${{ matrix.platform }}.tar.gz" "dep-porter-${{ matrix.platform }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dep-porter-${{ matrix.platform }}
          path: |
            dep-porter-${{ matrix.platform }}.tar.gz
            dep-porter-${{ matrix.platform }}.zip
          retention-days: 30

  create-release:
    needs: [check-version, build]
    if: needs.check-version.outputs.needs_release == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: previoustag
        run: |
          # Get the previous tag (the one before the current version)
          CURRENT_VERSION="${{ needs.check-version.outputs.version }}"
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep '^v' | grep -v "v${CURRENT_VERSION}" | head -1)
          if [ -z "$PREVIOUS_TAG" ]; then
            # If no previous tag, use the first commit
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD | head -1)
            echo "No previous tag found, using first commit: $PREVIOUS_TAG"
          else
            echo "Previous tag: $PREVIOUS_TAG"
          fi
          echo "tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release_notes
        run: |
          CURRENT_VERSION="${{ needs.check-version.outputs.version }}"
          TAG_NAME="v${CURRENT_VERSION}"
          PREVIOUS_TAG="${{ steps.previoustag.outputs.tag }}"
          
          echo "Generating release notes from $PREVIOUS_TAG to $TAG_NAME"
          
          # Generate changelog from commits between tags
          {
            echo "## What's Changed"
            echo ""
            
            # Get commits between tags with format: hash | author | subject
            if [ "$PREVIOUS_TAG" != "$(git rev-list --max-parents=0 HEAD | head -1)" ]; then
              git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"* %s (%h)" --no-merges 2>/dev/null || {
                git log HEAD --pretty=format:"* %s (%h)" --no-merges -20
              }
            else
              git log HEAD --pretty=format:"* %s (%h)" --no-merges -20
            fi
            
            echo ""
            echo ""
            echo "## Downloads"
            echo ""
            echo "| Platform | Architecture | File |"
            echo "|----------|--------------|------|"
            echo "| Linux | x86_64 | \`dep-porter-linux-amd64.tar.gz\` |"
            echo "| Linux | aarch64 | \`dep-porter-linux-arm64.tar.gz\` |"
            echo "| Windows | x86_64 | \`dep-porter-windows-amd64.zip\` |"
            echo "| macOS | x86_64 | \`dep-porter-macos-amd64.tar.gz\` |"
            echo "| macOS | aarch64 | \`dep-porter-macos-arm64.tar.gz\` |"
            echo ""
            echo "Each archive contains the \`dep-porter\` binary (or \`dep-porter.exe\` on Windows)."
            echo ""
            echo ""
            echo "## Docker Image"
            echo ""
            echo "\`\`\`bash"
            echo "docker pull gudaoxuri/dep-downloader:latest"
            echo "\`\`\`"
            echo ""
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${TAG_NAME}"
          } > release_notes.md
          
          echo "Release notes generated:"
          cat release_notes.md

      - name: Create tag
        run: |
          TAG_NAME="v${{ needs.check-version.outputs.version }}"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f -name "*.tar.gz" -o -name "*.zip" | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Release ${{ needs.check-version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
